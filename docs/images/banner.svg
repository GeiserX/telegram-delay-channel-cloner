<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0088CC"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="iconGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="40" x2="900" y2="40" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Clock icon -->
  <g transform="translate(85, 100)">
    <circle cx="0" cy="0" r="42" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.9"/>
    <circle cx="0" cy="0" r="38" fill="url(#iconGlow)" stroke="none"/>
    <!-- Clock hands -->
    <line x1="0" y1="2" x2="0" y2="-22" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="2" x2="16" y2="-8" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff"/>
    <!-- Hour markers -->
    <circle cx="0" cy="-32" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="32" cy="0" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="0" cy="32" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="-32" cy="0" r="2" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- Dashed arrow indicating delay -->
  <g transform="translate(155, 100)" opacity="0.6">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#ffffff" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="50,-6 62,0 50,6" fill="#ffffff"/>
  </g>

  <!-- Channel message bubbles -->
  <g transform="translate(230, 72)">
    <!-- First message bubble -->
    <rect x="0" y="0" width="44" height="28" rx="6" fill="#ffffff" opacity="0.85"/>
    <rect x="6" y="7" width="24" height="3" rx="1.5" fill="#0088CC" opacity="0.5"/>
    <rect x="6" y="14" width="32" height="3" rx="1.5" fill="#0088CC" opacity="0.35"/>
    <!-- Second message bubble (offset, delayed copy) -->
    <rect x="8" y="32" width="44" height="28" rx="6" fill="#ffffff" opacity="0.55"/>
    <rect x="14" y="39" width="24" height="3" rx="1.5" fill="#0088CC" opacity="0.35"/>
    <rect x="14" y="46" width="32" height="3" rx="1.5" fill="#0088CC" opacity="0.25"/>
  </g>

  <!-- Title text -->
  <text x="310" y="92" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="0.5">
    telegram-delay-channel-cloner
  </text>

  <!-- Subtitle -->
  <text x="310" y="124" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#ffffff" opacity="0.7" letter-spacing="0.3">
    Relay Telegram channel messages with a configurable delay
  </text>
</svg>
